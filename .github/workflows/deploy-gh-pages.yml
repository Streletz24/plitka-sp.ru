name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  # Do not let a PR/work branch cancel a main deployment (or vice versa).
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          # The site is opened from the Pages root/custom domain, so assets
          # must be built as /assets/... rather than /plitka-sp.ru/assets/...
          GH_PAGES_BASE: /
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify Pages artifact
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const indexHtml = fs.readFileSync('dist/index.html', 'utf8');
          const repoName = process.env.GITHUB_REPOSITORY?.split('/').pop();

          if (indexHtml.includes('/src/main.tsx')) {
            console.error('ERROR: dist/index.html still points to the unbuilt Vite entry /src/main.tsx.');
            process.exit(1);
          }

          if (!/\/assets\/[^"']+\.js/.test(indexHtml)) {
            console.error('ERROR: dist/index.html does not reference a built JS bundle from /assets/.');
            process.exit(1);
          }

          if (repoName && indexHtml.includes(`/${repoName}/assets/`)) {
            console.error(`ERROR: dist/index.html contains /${repoName}/assets/. That path breaks the Pages root/custom domain.`);
            process.exit(1);
          }

          if (!fs.existsSync('dist/CNAME') || fs.readFileSync('dist/CNAME', 'utf8').trim() !== 'plitka-sp.ru') {
            console.error('ERROR: dist/CNAME is missing or does not contain plitka-sp.ru.');
            process.exit(1);
          }

          console.log('Pages artifact is built for the root/custom domain.');
          NODE

      - name: Verify custom domain CNAME
        run: |
          test -f dist/CNAME
          test "$(cat dist/CNAME)" = "plitka-sp.ru"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
