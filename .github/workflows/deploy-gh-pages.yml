name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify source is React app
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const indexHtml = fs.readFileSync('index.html', 'utf8');
          if (indexHtml.includes('static-fallback') || indexHtml.includes('Если интерактивная версия')) {
            console.error('ERROR: source index.html contains the stale static fallback instead of the React root.');
            process.exit(1);
          }
          if (!indexHtml.includes('<div id="root"></div>') || !indexHtml.includes('/src/main.tsx')) {
            console.error('ERROR: source index.html does not contain the normal React/Vite entry.');
            process.exit(1);
          }
          console.log('Source index.html contains the normal React root and no stale fallback.');
          NODE

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          GH_PAGES_BASE: /plitka-sp.ru/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Write deployment marker
        run: |
          {
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "base=/plitka-sp.ru/"
            echo "target_url=https://streletz24.github.io/plitka-sp.ru/"
            echo "marker=REACT_SITE_BUILD_NO_FALLBACK_V1"
            date -u '+built_at=%Y-%m-%dT%H:%M:%SZ'
          } > dist/deploy-version.txt

      - name: Verify Pages artifact
        run: |
          set -euo pipefail

          if grep -R "Если интерактивная версия сайта" dist; then
            echo "ERROR: fallback text found in dist"
            exit 1
          fi

          if grep -R "static-fallback" dist; then
            echo "ERROR: static fallback found in dist"
            exit 1
          fi

          if grep -R "/src/main.tsx" dist/index.html; then
            echo "ERROR: raw Vite entry found in dist"
            exit 1
          fi

          if ! find dist/assets -name "*.js" | grep -q .; then
            echo "ERROR: no built JS assets found"
            exit 1
          fi

          if ! grep -q "/plitka-sp.ru/assets/" dist/index.html; then
            echo "ERROR: wrong base path in dist/index.html"
            exit 1
          fi

          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const indexHtml = fs.readFileSync('dist/index.html', 'utf8');
          const fallbackMarkers = [
            'static-fallback',
            'Если интерактивная версия сайта',
            'интерактивная версия',
            'временно не загрузилась',
            'эта страница остаётся доступной',
          ];

          if (indexHtml.includes('/src/main.tsx')) {
            console.error('ERROR: dist/index.html still points to /src/main.tsx instead of a built Vite bundle.');
            process.exit(1);
          }

          for (const marker of fallbackMarkers) {
            if (indexHtml.includes(marker)) {
              console.error(`ERROR: dist/index.html contains stale fallback marker: ${marker}`);
              process.exit(1);
            }
          }

          if (!/\/plitka-sp\.ru\/assets\/[^"']+\.js/.test(indexHtml)) {
            console.error('ERROR: dist/index.html does not reference a built JS bundle under /plitka-sp.ru/assets/.');
            process.exit(1);
          }

          const assetsDir = path.join('dist', 'assets');
          const jsAssets = fs.existsSync(assetsDir)
            ? fs.readdirSync(assetsDir).filter((file) => file.endsWith('.js'))
            : [];
          if (jsAssets.length === 0) {
            console.error('ERROR: dist/assets does not contain any built JS files.');
            process.exit(1);
          }

          if (fs.existsSync('dist/CNAME')) {
            console.error('ERROR: dist/CNAME must not be present while publishing the development project URL.');
            process.exit(1);
          }

          console.log('Pages artifact targets https://streletz24.github.io/plitka-sp.ru/ and contains the built React app with no stale fallback.');
          NODE

      - name: Add SPA fallback
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published project URL
        run: |
          set -euo pipefail
          TARGET_URL="https://streletz24.github.io/plitka-sp.ru/"
          MARKER_URL="${TARGET_URL}deploy-version.txt"

          curl -fsSL --retry 8 --retry-delay 5 --retry-all-errors "$TARGET_URL" -o /tmp/live-index.html
          curl -fsSL --retry 8 --retry-delay 5 --retry-all-errors "$MARKER_URL" -o /tmp/deploy-version.txt

          if grep -q "Если интерактивная версия сайта" /tmp/live-index.html; then
            echo "ERROR: fallback text is still present on the live project URL"
            exit 1
          fi

          if grep -q "static-fallback" /tmp/live-index.html; then
            echo "ERROR: static fallback marker is still present on the live project URL"
            exit 1
          fi

          if grep -q "/src/main.tsx" /tmp/live-index.html; then
            echo "ERROR: live project URL serves the raw Vite entry instead of the built app"
            exit 1
          fi

          if ! grep -q "/plitka-sp.ru/assets/" /tmp/live-index.html; then
            echo "ERROR: live project URL does not reference /plitka-sp.ru/assets/"
            exit 1
          fi

          grep -q "sha=${GITHUB_SHA}" /tmp/deploy-version.txt
          grep -q "base=/plitka-sp.ru/" /tmp/deploy-version.txt
          grep -q "target_url=https://streletz24.github.io/plitka-sp.ru/" /tmp/deploy-version.txt
          grep -q "marker=REACT_SITE_BUILD_NO_FALLBACK_V1" /tmp/deploy-version.txt
          echo "Published project URL is serving the built React app for ${GITHUB_SHA}."
