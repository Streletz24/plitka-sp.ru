name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Verify source is React app
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const indexHtml = fs.readFileSync('index.html', 'utf8');
          if (indexHtml.includes('static-fallback') || indexHtml.includes('Если интерактивная версия')) {
            console.error('ERROR: source index.html contains the stale static fallback instead of the React root.');
            process.exit(1);
          }
          if (!indexHtml.includes('<div id="root"></div>') || !indexHtml.includes('/src/main.tsx')) {
            console.error('ERROR: source index.html does not contain the normal React/Vite entry.');
            process.exit(1);
          }
          console.log('Source index.html contains the normal React root and no stale fallback.');
          NODE

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          GH_PAGES_BASE: ./
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Write deployment marker
        run: |
          {
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "base=./"
            date -u '+built_at=%Y-%m-%dT%H:%M:%SZ'
          } > dist/deploy-version.txt

      - name: Verify Pages artifact
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const indexHtml = fs.readFileSync('dist/index.html', 'utf8');
          const fallbackMarkers = [
            'static-fallback',
            'Если интерактивная версия сайта',
            'интерактивная версия',
            'временно не загрузилась',
            'эта страница остаётся доступной',
          ];

          if (indexHtml.includes('/src/main.tsx')) {
            console.error('ERROR: dist/index.html still points to /src/main.tsx instead of a built Vite bundle.');
            process.exit(1);
          }

          for (const marker of fallbackMarkers) {
            if (indexHtml.includes(marker)) {
              console.error(`ERROR: dist/index.html contains stale fallback marker: ${marker}`);
              process.exit(1);
            }
          }

          if (!/(?:\.\/)?assets\/[^"']+\.js/.test(indexHtml)) {
            console.error('ERROR: dist/index.html does not reference a built JS bundle under assets/.');
            process.exit(1);
          }

          const assetsDir = path.join('dist', 'assets');
          const jsAssets = fs.existsSync(assetsDir)
            ? fs.readdirSync(assetsDir).filter((file) => file.endsWith('.js'))
            : [];
          if (jsAssets.length === 0) {
            console.error('ERROR: dist/assets does not contain any built JS files.');
            process.exit(1);
          }

          if (!fs.existsSync('dist/CNAME') || fs.readFileSync('dist/CNAME', 'utf8').trim() !== 'plitka-sp.ru') {
            console.error('ERROR: dist/CNAME must exist and contain plitka-sp.ru.');
            process.exit(1);
          }

          console.log('Pages artifact contains the built React app, CNAME, and no stale fallback.');
          NODE

      - name: Verify custom domain CNAME
        run: |
          test -f dist/CNAME
          test "$(cat dist/CNAME)" = "plitka-sp.ru"

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
