name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          GH_PAGES_BASE: /plitka-sp.ru/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify dist artifact
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets
          find dist/assets -name "*.js" | grep -q .
          find dist/assets -name "*.css" | grep -q .
          grep -q "/plitka-sp.ru/assets/" dist/index.html
          ! grep -q "/src/main.tsx" dist/index.html
          ! grep -R "Если интерактивная версия сайта" dist
          ! grep -R "static-fallback" dist
          ! test -f dist/CNAME

      - name: Add Pages files
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          {
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "base=/plitka-sp.ru/"
            echo "target_url=https://streletz24.github.io/plitka-sp.ru/"
            date -u '+built_at=%Y-%m-%dT%H:%M:%SZ'
          } > dist/deploy-version.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
