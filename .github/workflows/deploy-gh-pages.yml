name: Deploy to GitHub Pages

on:
  push:
    branches: ["**"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Ensure Pages source is GitHub Actions
        env:
          PAGES_ADMIN_TOKEN: ${{ secrets.GH_PAGES_ADMIN_TOKEN || github.token }}
        run: |
          set -euo pipefail
          API_URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/pages"
          AUTH_HEADER="Authorization: Bearer ${PAGES_ADMIN_TOKEN}"
          API_VERSION_HEADER="X-GitHub-Api-Version: 2022-11-28"

          get_pages() {
            curl -fsSL \
              -H "Accept: application/vnd.github+json" \
              -H "$AUTH_HEADER" \
              -H "$API_VERSION_HEADER" \
              "$API_URL"
          }

          pages_json="$(get_pages)"
          build_type="$(PAGES_JSON="$pages_json" node -e 'const pages = JSON.parse(process.env.PAGES_JSON); console.log(pages.build_type || "legacy")')"

          if [ "$build_type" != "workflow" ]; then
            echo "GitHub Pages is currently build_type=$build_type. Switching to GitHub Actions workflow publishing."
            curl -fsSL \
              -X PUT \
              -H "Accept: application/vnd.github+json" \
              -H "$AUTH_HEADER" \
              -H "$API_VERSION_HEADER" \
              "$API_URL" \
              -d '{"build_type":"workflow","cname":null}'
          fi

          pages_json="$(get_pages)"
          build_type="$(PAGES_JSON="$pages_json" node -e 'const pages = JSON.parse(process.env.PAGES_JSON); console.log(pages.build_type || "legacy")')"
          if [ "$build_type" != "workflow" ]; then
            echo "ERROR: GitHub Pages source is still $build_type. In Settings → Pages set Build and deployment → Source = GitHub Actions."
            exit 1
          fi

          echo "GitHub Pages source is GitHub Actions."

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          GH_PAGES_BASE: /plitka-sp.ru/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Verify dist artifact
        run: |
          set -euo pipefail
          test -f dist/index.html
          test -d dist/assets
          find dist/assets -name "*.js" | grep -q .
          find dist/assets -name "*.css" | grep -q .
          grep -q "/plitka-sp.ru/assets/" dist/index.html
          ! grep -q "/src/main.tsx" dist/index.html
          ! grep -R "Если интерактивная версия сайта" dist
          ! grep -R "static-fallback" dist
          ! test -f dist/CNAME

      - name: Add Pages files
        run: |
          cp dist/index.html dist/404.html
          touch dist/.nojekyll
          {
            echo "sha=${GITHUB_SHA}"
            echo "ref=${GITHUB_REF}"
            echo "base=/plitka-sp.ru/"
            echo "target_url=https://streletz24.github.io/plitka-sp.ru/"
            date -u '+built_at=%Y-%m-%dT%H:%M:%SZ'
          } > dist/deploy-version.txt

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Verify published project URL
        run: |
          set -euo pipefail
          TARGET_URL="https://streletz24.github.io/plitka-sp.ru/"
          MARKER_URL="${TARGET_URL}deploy-version.txt"

          curl -fsSL --retry 8 --retry-delay 5 --retry-all-errors "$TARGET_URL" -o /tmp/live-index.html
          curl -fsSL --retry 8 --retry-delay 5 --retry-all-errors "$MARKER_URL" -o /tmp/deploy-version.txt

          if grep -q "Если интерактивная версия сайта" /tmp/live-index.html; then
            echo "ERROR: fallback text is still present on the live project URL"
            exit 1
          fi

          if grep -q "static-fallback" /tmp/live-index.html; then
            echo "ERROR: static fallback marker is still present on the live project URL"
            exit 1
          fi

          if grep -q "/src/main.tsx" /tmp/live-index.html; then
            echo "ERROR: live project URL serves the raw Vite entry instead of the built app"
            exit 1
          fi

          if ! grep -q "/plitka-sp.ru/assets/" /tmp/live-index.html; then
            echo "ERROR: live project URL does not reference /plitka-sp.ru/assets/"
            exit 1
          fi

          LIVE_ASSETS=$(grep -oE '/plitka-sp\.ru/assets/[^"'"'"']+\.(js|css)' /tmp/live-index.html | sort -u)
          if ! printf '%s\n' "$LIVE_ASSETS" | grep -q '\.js$'; then
            echo "ERROR: live project URL does not reference a JS asset"
            exit 1
          fi
          if ! printf '%s\n' "$LIVE_ASSETS" | grep -q '\.css$'; then
            echo "ERROR: live project URL does not reference a CSS asset"
            exit 1
          fi

          printf '%s\n' "$LIVE_ASSETS" | while IFS= read -r asset_path; do
            [ -n "$asset_path" ] || continue
            curl -fsSI --retry 8 --retry-delay 5 --retry-all-errors "https://streletz24.github.io${asset_path}" >/dev/null
          done

          grep -q "sha=${GITHUB_SHA}" /tmp/deploy-version.txt
          grep -q "base=/plitka-sp.ru/" /tmp/deploy-version.txt
          grep -q "target_url=https://streletz24.github.io/plitka-sp.ru/" /tmp/deploy-version.txt
          grep -q "marker=REACT_SITE_BUILD_NO_FALLBACK_V1" /tmp/deploy-version.txt
          echo "Published project URL is serving the built React app for ${GITHUB_SHA}."
