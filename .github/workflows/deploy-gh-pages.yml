name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Configure npm registry
        run: npm config set registry https://registry.npmjs.org/

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: true
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}


      - name: Verify DOCX download marker in build
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const path = require('path');
          const marker = 'DOCX_DOWNLOAD_ENABLED_V4';
          const walk = (dir) => fs.readdirSync(dir, { withFileTypes: true }).flatMap((entry) => {
            const fullPath = path.join(dir, entry.name);
            return entry.isDirectory() ? walk(fullPath) : [fullPath];
          });
          const files = walk('dist');
          const allText = files.map((file) => fs.readFileSync(file, 'utf8')).join('\n');
          const indexHtml = fs.readFileSync('dist/index.html', 'utf8');
          const cname = fs.existsSync('dist/CNAME') ? fs.readFileSync('dist/CNAME', 'utf8').trim() : '';
          if (cname !== 'plitka-sp.ru') {
            console.error(`ERROR: dist/CNAME must contain plitka-sp.ru for the custom domain. Current value: ${cname || '<missing>'}`);
            process.exit(1);
          }
          if (!fs.existsSync('dist/.nojekyll')) {
            console.error('ERROR: dist/.nojekyll is missing. Keep it in the Pages artifact to prevent Jekyll processing.');
            process.exit(1);
          }
          const repoName = process.env.GITHUB_REPOSITORY?.split('/').pop();
          if (repoName && indexHtml.includes(`/${repoName}/assets/`)) {
            console.error(`ERROR: dist/index.html contains a repository-prefixed asset path /${repoName}/assets/. Use a relative Vite base so the custom domain does not render a white screen.`);
            process.exit(1);
          }
          const requiredMarkers = [marker, 'Скачать Word-бланк заказа', 'blank-zakaza', 'WHITE_SCREEN_FALLBACK_V1'];
          for (const requiredMarker of requiredMarkers) {
            if (!allText.includes(requiredMarker)) {
              console.error(`${requiredMarker} was not found in dist. GitHub Pages artifact would contain an old cart download implementation.`);
              process.exit(1);
            }
          }
          if (/blank-zakaza[^\s"']*\.pdf|application\/pdf|Распечатать заказ|printOrderBlank/.test(allText)) {
            console.error('ERROR: PDF/print order blank still exists in production build.');
            process.exit(1);
          }
          console.log(`${marker}, Word button text and blank-zakaza docx marker found in dist; no PDF order blank marker found.`);
          NODE

      - name: Add SPA fallback
        run: cp dist/index.html dist/404.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
